server {
    listen 80;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # API endpoints
    location /api/ {
        proxy_pass http://backend:5000/api/;
    }

    # Dedicated WebSocket endpoint for the backend
    location /ws/ {
        proxy_pass http://backend:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Static directories served by backend
    location /output_videos/ {
        proxy_pass http://backend:5000/output_videos/;
    }

    location /knownfaces/ {
        proxy_pass http://backend:5000/knownfaces/;
    }
}