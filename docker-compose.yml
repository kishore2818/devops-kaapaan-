services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: useless_backend
    ports:
      - "5001:5000"
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: useless_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped