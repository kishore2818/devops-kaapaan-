version: "3.8"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: useless_backend

    expose:
      - "5000"

    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      - PORT=5000


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: useless_frontend

    expose:
      - "80"

    depends_on:
      - backend

    restart: unless-stopped


  nginx:
    image: nginx:latest

    container_name: useless_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend